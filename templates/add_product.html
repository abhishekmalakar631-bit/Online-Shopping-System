{% extends "layout.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0" style="border-radius: 20px;">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4 fw-bold">Add New Product</h2>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Product Name</label>
                            <input type="text" name="name" class="form-control form-control-lg shadow-sm" style="border-radius: 10px;" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Price (₹)</label>
                                <input type="number" step="0.01" name="price" class="form-control shadow-sm" style="border-radius: 10px;" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Stock Quantity</label>
                                <input type="number" name="stock" class="form-control shadow-sm" style="border-radius: 10px;" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Image URL</label>
                            <input type="url" name="image_url" class="form-control shadow-sm" style="border-radius: 10px;" placeholder="https://example.com/image.jpg">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea name="description" class="form-control shadow-sm" rows="3" style="border-radius: 10px;"></textarea>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg shadow" style="border-radius: 12px; background: linear-gradient(45deg, #2563eb, #3b82f6);">
                                List Product
                            </button>
                            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-light btn-sm text-muted">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
